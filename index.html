<!-- Glass tier detection — must run before theme init -->
<script>
  (function () {
    // Tier 3: CSS-only (reduced motion or no backdrop-filter)
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.documentElement.dataset.glassTier = '3';
      return;
    }
    if (typeof CSS !== 'undefined' && CSS.supports('backdrop-filter', 'blur(1px)')) {
      // Tier 2: SVG fallback (backdrop-filter supported but WebGPU unknown)
      document.documentElement.dataset.glassTier = '2';
      // Tier 1: WebGPU — detected async in main.jsx, upgrades from 2→1 if available
      if (navigator.gpu) {
        navigator.gpu.requestAdapter().then(function (adapter) {
          if (adapter) document.documentElement.dataset.glassTier = '1';
        }).catch(function () {});
      }
    } else {
      document.documentElement.dataset.glassTier = '3';
    }
  })();
</script>
<!-- Theme init — must run before paint to prevent flash -->
<script>
(function() {
  const saved = localStorage.getItem('lg-theme');
  const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  const theme = (saved === 'dark' || saved === 'light') ? saved : preferred;
  document.documentElement.setAttribute('data-theme', theme);
  const tc = document.querySelector('meta[name="theme-color"]');
  if (tc) tc.setAttribute('content', theme === 'dark' ? '#0A0A0A' : '#F5F2EE');
})();
</script>
<style>

html, body { height: 100%; overflow: hidden; }
[data-theme="dark"] { background: #0A0A0A; color: #F5F5F5; }
[data-theme="light"] { background: #F5F2EE; color: #1A1815; }
body { font-family: 'Space Grotesk', system-ui, sans-serif; }
#app { height: 100%; display: flex; }
/* Prevent FOUC on glass elements */
.lg-glass { visibility: hidden; }
.lg-glass[data-glass-ready] { visibility: visible; }
